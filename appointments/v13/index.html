
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paubox Templated Email</title>
  <link rel="stylesheet" href="https://jcrow-cloud.github.io/mulepbox/v13/styles.css" />
</head>
<body>
  <h2>V13 Paubox Templated Email</h2>
  <p>PauBox is case sensitive</p>

  <div class="row">
    <label for="templateName" id="labelTemplateName">Dynamic Template Name</label>
    <input id="templateName" type="text" placeholder="e.g., sfmc_pcomm_appointment_confirmation" />
  </div>
  <div class="row">
    <label for="subject" id="labelSubject">Subject</label>
    <input id="subject" type="text" placeholder="e.g., Your appointment details" />
  </div>
 <script src="https://jcrow-cloud.github.io/mulepbox/v13/js/postmonger.min.js"></script>
<script src="https://jcrow-cloud.github.io/mulepbox/v13/js/customActivity.js"></script></body>
</html>
