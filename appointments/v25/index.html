<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>v24 Paubox Templated Email</title>
  <link rel="stylesheet" href="https://jcrow-cloud.github.io/mulepbox/v25/styles.css" />
</head>
<body>

  <h2>V25  Paubox Templated Email</h2>

  <div class="row">
    <label for="apiJourneyEntryName">Journey Entry Event or DE Name</label>
    <input
      id="apiJourneyEntryName"
      type="text"
      placeholder="e.g. appointmentConfirmation_stg"
    />
  </div>

  <div class="row">
    <label for="templateName">Template Name</label>
    <input
      id="templateName"
      type="text"
      placeholder="e.g. SFMC_PCOMM_appt_reminder_v1"
    />
  </div>

  <div class="row">
    <label for="subject">Subject</label>
    <input
      id="subject"
      type="text"
      placeholder="e.g. Your upcoming Quest appointment"
    />
  </div>

  <script src="https://jcrow-cloud.github.io/mulepbox/v25/js/postmonger.min.js"></script>
  <script src="https://jcrow-cloud.github.io/mulepbox/v25/js/customActivity.js"></script>

</body>
</html>
