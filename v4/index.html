
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paubox Templated Email</title>
  <link rel="stylesheet" href="https://jcrow-cloud.github.io/mulepbox/v4/styles.css" />
</head>
<body>
  <h2>Paubox Templated Email v11 </h2>

  <div class="row">
    <label for="templateName" id="labelTemplateName">Template name - always use prefix SFMC_PCOMM_</label>
    <input id="templateName" type="text" placeholder="e.g., SFMC_PCOMM_appointment_confirmation" />
  </div>
  <div class="row">
    <label for="subject" id="labelSubject">Subject</label>
    <input id="subject" type="text" placeholder="e.g., Your appointment details" />
  </div>
 <script src="https://jcrow-cloud.github.io/mulepbox/v4/js/postmonger.min.js"></script>
<script src="https://jcrow-cloud.github.io/mulepbox/v4/js/customActivity.js"></script></body>
</html>
